name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v2.2.1)'
        required: true
        default: 'v2.2.1'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Pre-build diagnostics
        shell: pwsh
        run: |
          Write-Host "=== Environment Diagnostics ==="
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          Write-Host "Python: $(python --version)"
          Write-Host "Java: $(java -version 2>&1 | Select-Object -First 1)"
          
          # Check if JAVA_HOME is set
          if (-not $env:JAVA_HOME) {
            Write-Error "JAVA_HOME is not set!"
            exit 1
          }
          
          # Check JDK structure
          $jdkBin = Join-Path $env:JAVA_HOME "bin"
          Write-Host "JDK bin path: $jdkBin"
          Write-Host "keytool exists: $(Test-Path (Join-Path $jdkBin 'keytool.exe'))"
          Write-Host "java exists: $(Test-Path (Join-Path $jdkBin 'java.exe'))"
          
          # Check tkinter
          python -c "import tkinter; print('tkinter OK')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography

      - name: Build portable EXE
        shell: cmd
        run: |
          set PYTHONUNBUFFERED=1
          python -u build_portable.py > build.log 2>&1
          set EXITCODE=%ERRORLEVEL%
          type build.log
          if %EXITCODE% neq 0 (
            echo === BUILD FAILED ===
            echo Exit code: %EXITCODE%
            exit /b %EXITCODE%
          )

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log

      - name: Verify EXE
        shell: pwsh
        run: |
          $exe = "dist/APK签名替换工具.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "EXE created: $([math]::Round($size, 2)) MB"
            if ($size -lt 50) {
              Write-Warning "EXE size is suspiciously small, JDK may not be included"
            }
          } else {
            Write-Error "EXE not found"
            exit 1
          }

      - name: Rename output
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $src = "dist/APK签名替换工具.exe"
          $dst = "dist/APK-Signer-Tool-$version.exe"
          Copy-Item $src $dst
          Write-Host "Output: $dst"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: APK 签名替换工具 ${{ github.event.inputs.version || github.ref_name }}
          files: dist/APK-Signer-Tool-*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
