name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v2.2.1)'
        required: true
        default: 'v2.2.1'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug environment
        shell: pwsh
        run: |
          Write-Host "=== Python Version ==="
          python --version
          Write-Host "=== Python Path ==="
          Get-Command python | Select-Object Source
          Write-Host "=== Java Version ==="
          java -version
          Write-Host "=== JAVA_HOME ==="
          $env:JAVA_HOME
          Write-Host "=== Directory Structure ==="
          Get-ChildItem -Recurse -Depth 2 | Select-Object FullName
          Write-Host "=== Check tkinter ==="
          python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography

      - name: Build portable EXE
        shell: pwsh
        run: |
          $env:PYTHONUNBUFFERED = "1"
          python build_portable.py 2>&1 | Tee-Object -FilePath build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            Write-Host "=== BUILD FAILED ==="
            Write-Host "Exit code: $exitCode"
            Write-Host "=== LAST 100 LINES OF LOG ==="
            Get-Content build.log -Tail 100
            exit $exitCode
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log

      - name: Verify EXE
        shell: pwsh
        run: |
          $exe = "dist/APK签名替换工具.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "EXE created: $([math]::Round($size, 2)) MB"
            if ($size -lt 50) {
              Write-Host "WARNING: EXE size is suspiciously small, JDK may not be included"
            }
          } else {
            Write-Host "ERROR: EXE not found"
            exit 1
          }

      - name: Rename output
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $src = "dist/APK签名替换工具.exe"
          $dst = "dist/APK-Signer-Tool-$version.exe"
          Copy-Item $src $dst
          Write-Host "Output: $dst"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: APK 签名替换工具 ${{ github.event.inputs.version || github.ref_name }}
          files: dist/APK-Signer-Tool-*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
