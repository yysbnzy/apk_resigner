name: Build and Release

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v2.2.0)'
        required: true
        default: 'v2.2.0'
  # 推送 tag 时自动触发
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 允许上传 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography

      - name: Build portable EXE
        shell: cmd
        run: python build_portable.py

      - name: Rename output
        run: |
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $src = "dist/APK签名替换工具.exe"
          $dst = "dist/APK-Signer-Tool-$version.exe"
          Copy-Item $src $dst
          Write-Host "Output: $dst"

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: APK 签名替换工具 ${{ github.event.inputs.version || github.ref_name }}
          files: dist/APK-Signer-Tool-*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
