name: Test PyInstaller

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Test simple PyInstaller build
        run: |
          echo "print('Hello')" > test.py
          pyinstaller --onefile test.py
          dir dist/

      - name: Test tkinter import
        run: python -c "import tkinter; print(tkinter.Tcl().eval('info patchlevel'))"

      - name: Test full build (without JDK tools)
        run: |
          pyinstaller --onefile --windowed --name APK-Test apk_resigner_gui.py || true
          dir dist/ || true
