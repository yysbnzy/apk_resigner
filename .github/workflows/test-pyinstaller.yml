name: Test PyInstaller

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Test simple PyInstaller
        shell: cmd
        run: |
          echo "=== Test 1: PyInstaller version ==="
          python -m PyInstaller --version
          
          echo "=== Test 2: Simple build ==="
          echo print('Hello') > test_hello.py
          python -m PyInstaller --noconfirm --onefile test_hello.py
          
          echo "=== Test 3: Check output ==="
          dir dist\test_hello.exe
          
          echo "=== Test 4: Run EXE ==="
          dist\test_hello.exe

      - name: Test with tkinter
        shell: cmd
        run: |
          echo "=== Test tkinter import ==="
          python -c "import tkinter; print('tkinter OK')"
          
          echo "=== Test PyInstaller with tkinter ==="
          echo import tkinter > test_tk.py
          echo print(tkinter.Tcl().eval('info patchlevel')) >> test_tk.py
          python -m PyInstaller --noconfirm --onefile --windowed test_tk.py
          dir dist\test_tk.exe

      - name: Test build_portable.py directly
        shell: cmd
        run: |
          echo "=== Test build_portable.py ==="
          python -u -c "
import sys
sys.path.insert(0, '.')
print('Python version:', sys.version)
print('Importing build_portable...')
from build_portable import PortableBuilder
print('Creating builder...')
builder = PortableBuilder('.')
print('Builder created successfully')
print('Tools dir:', builder.tools_dir)
print('Project dir:', builder.project_dir)
"
